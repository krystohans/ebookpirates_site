<!DOCTYPE html>

<html>
<head>
<base target="_top"/>
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<link href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<section class="container" style="padding-top: 100px;">
<div aria-label="Nyelvvalaszto" class="lang-switch">
<button class="lang-btn" data-lang-id="hu" title="Magyar" type="button"><span class="fi fi-hu"></span></button>
<button class="lang-btn" data-lang-id="en" title="English" type="button"><span class="fi fi-gb"></span></button>
<button class="lang-btn" data-lang-id="de" title="Deutsch" type="button"><span class="fi fi-de"></span></button>
<button class="lang-btn" data-lang-id="fr" title="Francais" type="button"><span class="fi fi-fr"></span></button>
<button class="lang-btn" data-lang-id="es" title="Espanol" type="button"><span class="fi fi-es"></span></button>
<button class="lang-btn" data-lang-id="pl" title="Polski" type="button"><span class="fi fi-pl"></span></button>
<button class="lang-btn" data-lang-id="ru" title="Russkiy" type="button"><span class="fi fi-ru"></span></button>
</div>
<div class="page-section mt-4">
<h3 data-lang="kerdes_title">Irodalmi Kvízkérdés Rögzítése a Hártyavadász Játékhoz</h3>
<p data-lang="kerdesbekuldo_p_1">Ezen a felületen új kérdéseket adhatsz a játékhoz. Kérjük, ügyelj a helyesírásra és a kérdések egyediségére!</p>
<div id="kerdes-form-container">
<div class="form-group" style="margin-bottom: 15px;">
<label data-lang="kerdesbekuldo_label_2" for="new-question-text">Kérdés szövege:</label>
<input id="new-question-text" placeholder="Pl. Ki írta az Anyám tyúkját?" style="width: 100%; padding: 8px; box-sizing: border-box;" type="text"/>
</div>
<div class="form-group" style="margin-bottom: 15px;">
<label data-lang="kerdesbekuldo_label_3" for="new-correct-answer">Helyes válasz:</label>
<input id="new-correct-answer" placeholder="Pl. Petőfi Sándor" style="border: 2px solid green; width: 100%; padding: 8px; box-sizing: border-box;" type="text"/>
</div>
<div class="form-group" style="margin-bottom: 15px;">
<label data-lang="kerdesbekuldo_label_4">Helytelen válaszlehetőségek:</label>
<input id="new-alt-1" placeholder="1. alternatíva (pl. Arany László)" style="width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px;" type="text"/>
<input id="new-alt-2" placeholder="2. alternatíva (pl. Toldi Miklós)" style="width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px;" type="text"/>
<input id="new-alt-3" placeholder="3. alternatíva (pl. Tyukodi Bence)" style="width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px;" type="text"/>
</div>
<div class="form-group" style="margin-bottom: 20px;">
<label data-lang="kerdesbekuldo_label_5" for="submitter-name">Beküldő kalóz neve:</label>
<input id="submitter-name" value="Ismeretlen kalóz" readonly style="width: 100%; padding: 8px; box-sizing: border-box; background-color: #2a2a2a; color: #fff; border: 1px solid #444; cursor: not-allowed;" type="text"/>
</div>
<input id="website-url-hp" style="display:none" type="text" autocomplete="off" tabindex="-1" />
<button class="btn" data-lang="kerdesbekuldo_button_6" id="submit-question-btn" disabled>Kérdés beküldése</button>
<div id="question-feedback-message" style="margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.2em;"></div>
</div>
</div>
</section>
<script src="../web_fordito.js"></script>
<script src="app.js"></script>
<script>
      // Nyelvváltó és oldal-újrafordító shimek (Archy Lead Architect)
      function changeLang(lang) {
        if (typeof switchLanguage === 'function') {
          switchLanguage(lang);
        }
      }
      function translatePage() {
        if (typeof updateLanguageUI === 'function') {
          updateLanguageUI();
        }
      }

      document.addEventListener("DOMContentLoaded", function() {
        // Nyelvi szótár betöltése és oldal fordítása
        translatePage();

        // Helyi nyelvválasztó gombok kezelése
        var buttons = document.querySelectorAll('.lang-btn');
        buttons.forEach(function(btn) {
          // Kattintáskor nyelvváltás és gomb állapot frissítése
          btn.addEventListener('click', function() {
            var lang = btn.getAttribute('data-lang-id');
            if (lang) {
              changeLang(lang);
              buttons.forEach(function(b) {
                var bLang = b.getAttribute('data-lang-id');
                b.classList.toggle('active', bLang === lang);
              });
            }
          });

          // Kezdeti aktív kijelölés beállítása
          var bLang = btn.getAttribute('data-lang-id');
          var currentLang = localStorage.getItem('siteLang') || 'hu';
          btn.classList.toggle('active', bLang === currentLang);
        });

        // Eredeti oldal-kiszolgáló inicializáló hívás
        if (typeof initializeKerdesbekuldoPage === 'function') {
          initializeKerdesbekuldoPage();
        } else {
          console.error("Hiba: Az 'initializeKerdesbekuldoPage' funkció nem található.");
        }
      });
    </script>
</body>
</html>
