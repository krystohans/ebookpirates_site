<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H+írtyavad+ísz 3D</title>
    <style>
        /* Alapvet+Ĺ be+íll+şt+ísok */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Georgia', serif; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI r+ęteg */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .glass-panel {
            background: rgba(100, 10, 15, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #eaddb5;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #top-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between;
            min-width: 300px;
        }
        
        #top-bar h1 { margin: 0; font-size: 24px; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        #score-board { font-size: 20px; font-weight: bold; }

        /* Kv+şz Overlay */
        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 20; pointer-events: auto;
        }
        
        #quiz-panel {
            width: 80%; max-width: 600px; padding: 40px; text-align: center;
            display: flex; flex-direction: column; gap: 20px;
        }

        #quiz-question { font-size: 24px; font-weight: bold; color: #fff; line-height: 1.5; text-shadow: 2px 2px 4px #000; }
        
        #timer-bar-container { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #4CAF50; transition: width 0.1s linear; }

        .answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn {
            background-image: url('https://storage.googleapis.com/kalozsziget-assets/images/ovalis_gomb-rw.png');
            background-size: 100% 100%;
            background-color: transparent;
            background-repeat: no-repeat;
            border: none; color: #fffbcc;
            padding: 20px 30px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }
        .answer-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .old-btn { 
            background: linear-gradient(180deg, #8a5a19 0%, #3a2205 100%);
            border: 2px solid #d4af37; border-radius: 8px; color: #fffbcc;
            padding: 15px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold;
        }
        .answer-btn:hover { transform: scale(1.05); border-color: #fff; }

        /* T+ętes fel+-let */
        #betting-area { display: none; flex-direction: column; align-items: center; gap: 15px; }
        #bet-input {
            padding: 10px; font-size: 20px; text-align: center; width: 150px;
            background: rgba(0,0,0,0.5); color: #d4af37; border: 2px solid #d4af37; border-radius: 8px;
        }
        #place-bet-btn {
            background: #2E7D32; color: white; border: 2px solid #4CAF50; padding: 12px 30px;
            font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #place-bet-btn:hover { background: #4CAF50; }

        /* +ërint+Ĺ Joystick */
        #joystick-area {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,215,0,0.3);
            display: none; pointer-events: auto; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: rgba(212, 175, 55, 0.6); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #game-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; color: #fff; text-shadow: 0 0 20px red; font-weight: bold; display: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="top-bar" class="glass-panel">
            <h1>H+írtyavad+ísz</h1>
            <div id="score-board">H+írty+ík: 0</div>
        </div>
        
        <div id="joystick-area">
            <div id="joystick-knob"></div>
        </div>

        <div id="game-message">J+ít+ęk V+ęge!</div>
        <div id="start-instruction" style="position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #fff; text-shadow: 0 0 10px #000; text-align: center; pointer-events: none;">Nyomd meg a W-A-S-D gombokat az indul+íshoz!<br><span style="font-size: 16px; color: #d4af37;">(Szedj +Âssze h+írty+íkat, +ęs ker+-ld el a l+ęghaj+-t!)</span></div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-panel" class="glass-panel">
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
            <div id="quiz-question">K+ęrd+ęs bet+Âlt+ęse...</div>
            
            <div id="answer-buttons" class="answer-buttons"></div>
            
            <div id="betting-area">
                <div id="max-bet-info">Maxim+ílis t+ęt lek+ęrdez+ęse...</div>
                <input type="number" id="bet-input" min="1" placeholder="T+ęt">
                <button id="place-bet-btn">T+ęt Megt+ętele</button>
            </div>
        </div>
    </div>

    <!-- Three.js +ęs GLTFLoader bet+Âlt+ęse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader kikapcsolva az 1. f+ízisra -->

    <script>
        // ==========================================
        // 1. GLOB+üLIS V+üLTOZ+ôK +ëS KOMMUNIK+üCI+ô
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const playerToken = urlParams.get('token');
        
        let quizQuestions = [];
        let scoreOnBoat = 0; // H+írty+ík a cs+-nakon
        let baseHarborScore = 0; // H+írty+ík a b+ízison
        let isGameOver = false;
        let gameStarted = false;
        let currentBet = 0;
        let maxBetAmount = 0;
        let correctAnswer = "";
        let activeDiamond = null;
        let timerInterval;
        let timeLeft = 20;

        function callBackend(action, params) {
            return new Promise((resolve, reject) => {
                const messageId = 'msg_' + Math.random().toString(36).substr(2, 9);
                const listener = (event) => {
                    if (event.data && event.data.messageId === messageId) {
                        window.removeEventListener('message', listener);
                        if (event.data.error) reject(event.data.error);
                        else resolve(event.data.response);
                    }
                };
                window.addEventListener('message', listener);
                window.parent.postMessage({ type: 'backendCall', action: action, params: params, messageId: messageId }, '*');
            });
        }

        async function initGameData() {
            try {
                const response = await callBackend('getQuizQuestions', []);
                quizQuestions = response || [];
                const betResponse = await callBackend('getMaximumBet', []);
                maxBetAmount = betResponse || 0;
                if(document.getElementById('max-bet-info')) {
                    document.getElementById('max-bet-info').innerText = "Maxim+ílis t+ęt: " + maxBetAmount;
                }
            } catch (e) { console.error("Adatbet+Âlt+ęsi hiba:", e); }
        }
        initGameData();

        // Sz+ęlz+íszl+- UI gener+íl+ísa
        const windVane = document.createElement('div');
        windVane.id = 'wind-vane';
        windVane.style.position = 'absolute';
        windVane.style.top = '80px';
        windVane.style.right = '20px';
        windVane.style.width = '50px';
        windVane.style.height = '50px';
        windVane.style.background = 'rgba(0,0,0,0.5)';
        windVane.style.borderRadius = '50%';
        windVane.style.display = 'flex';
        windVane.style.justifyContent = 'center';
        windVane.style.alignItems = 'center';
        windVane.style.color = '#fff';
        windVane.style.fontSize = '24px';
        windVane.style.zIndex = '15';
        windVane.innerHTML = 'Ô×Ą';
        document.body.appendChild(windVane);

        // Pontsz+ímjelz+Ĺ m+-dos+şt+ísa
        const scoreBoard = document.getElementById('score-board');
        function updateScoreBoard() {
            scoreBoard.innerText = Cs+-nakon:  | B+ízison: ;
        }

        // ==========================================
        // 2. THREE.JS MOTOR INICIALIZ+üL+üS
        // ==========================================
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        // Kamera be+íll+şt+ísok
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        let cameraDistance = 30; // Zoom szint
        let cameraAngle = Math.PI / 4; // Orbit sz+Âg (kezd+ęsnek 45 fok h+ítulr+-l)
        const CAMERA_PITCH = Math.PI / 4; // 45 fokos d+Ĺl+ęssz+Âg lefel+ę

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // F+ęny (Egyetlen Nap)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        sunLight.position.set(100, 200, 50);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -200;
        sunLight.shadow.camera.right = 200;
        sunLight.shadow.camera.top = 200;
        sunLight.shadow.camera.bottom = -200;
        sunLight.shadow.camera.far = 500;
        scene.add(sunLight);

        // V+şz fel+-let (visszasz+-r+íssal)
        const waterGeo = new THREE.PlaneGeometry(1000, 1000);
        const waterMat = new THREE.MeshPhongMaterial({ 
            color: 0x006699, 
            shininess: 100, 
            specular: 0x111111,
            transparent: true, 
            opacity: 0.9 
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.receiveShadow = true;
        scene.add(water);

        // J+ít+ęk elemek
        let playerBoat = null;
        let baseHarbor = null;
        let enemyShip = null;
        let battleship = null;
        const obstacles = [];
        const diamonds = [];
        
        const MAP_RADIUS = 300;
        // B+ízis a jobb fels+Ĺ sarokban (X+, Z-)
        const BASE_POS = new THREE.Vector3(150, 0, -150);

        // Egyszer+- Pseudo-Random Gener+ítor a permanens p+íly+íhoz
        class PRNG {
            constructor(seed) { this.seed = seed; }
            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
        }
        const rng = new PRNG(12345); // Fix seed!

        function buildScene() {
            // 1. Kik+Ât+Ĺ (B+ízis) - Z+Âld lapos henger
            const harborGeo = new THREE.CylinderGeometry(30, 30, 2, 32);
            const harborMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            baseHarbor = new THREE.Mesh(harborGeo, harborMat);
            baseHarbor.position.copy(BASE_POS);
            baseHarbor.receiveShadow = true;
            scene.add(baseHarbor);

            // 2. J+ít+ękos cs+-nakja
            const boatGeo = new THREE.BoxGeometry(4, 3, 8);
            const boatMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            playerBoat = new THREE.Mesh(boatGeo, boatMat);
            playerBoat.position.set(BASE_POS.x - 40, 1.5, BASE_POS.z + 40); // B+ízis mell+Ĺl indul
            playerBoat.castShadow = true;
            scene.add(playerBoat);

            // 3. L+ęghaj+- (+ťld+Âz+Ĺ) - Piros g+Âmb er+Ĺs +írny+ękkal
            const enemyGeo = new THREE.SphereGeometry(8, 16, 16);
            const enemyMat = new THREE.MeshStandardMaterial({ color: 0xB22222 });
            enemyShip = new THREE.Mesh(enemyGeo, enemyMat);
            enemyShip.position.set(-200, 20, 200); // Bal als+- sarokb+-l indul
            enemyShip.castShadow = true;
            scene.add(enemyShip);

            // 4. Csatahaj+- (Falon k+şv+-li blokk bal als+- sarokban)
            const battleGeo = new THREE.BoxGeometry(40, 15, 80);
            const battleMat = new THREE.MeshStandardMaterial({ color: 0x880000 });
            battleship = new THREE.Mesh(battleGeo, battleMat);
            battleship.position.set(-250, 7.5, 250);
            battleship.rotation.y = Math.PI / 4;
            battleship.castShadow = true;
            battleship.boundingRadius = 45;
            scene.add(battleship);
            obstacles.push(battleship);

            // 5. Z+ítonyok Gauss-eloszl+íssal a B+ízist+-l t+ívolodva
            const totalRocks = 350;
            const rockGeo = new THREE.CylinderGeometry(3, 5, 10, 8);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

            for(let i = 0; i < totalRocks; i++) {
                // Gauss eloszl+ís a b+ízis t+ívols+íg+íra
                let u = 0, v = 0;
                while(u === 0) u = rng.next();
                while(v === 0) v = rng.next();
                let num = Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
                num = num / 8.0 + 0.5; 
                if (num > 1 || num < 0) num = rng.next(); 
                
                let r = 40 + Math.pow(num, 0.8) * 400; // T+ívols+íg a b+ízist+-l
                let theta = rng.next() * 2 * Math.PI;

                let x = BASE_POS.x + r * Math.cos(theta);
                let z = BASE_POS.z + r * Math.sin(theta);

                // Ha kiesik a vil+ígb+-l, kihagyjuk
                if (Math.sqrt(x*x + z*z) > MAP_RADIUS + 100) continue;

                let rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(x, 2, z);
                rock.rotation.x = (rng.next() - 0.5) * 0.4;
                rock.rotation.z = (rng.next() - 0.5) * 0.4;
                rock.castShadow = true;
                rock.receiveShadow = true;
                rock.boundingRadius = 5;
                
                scene.add(rock);
                obstacles.push(rock);
            }

            // +üthatolhatatlan z+ítonygy+-r+- a p+ílya sz+ęl+ęn (Orig+-t+-l R=350)
            for(let theta = 0; theta < Math.PI * 2; theta += 0.05) {
                let x = 350 * Math.cos(theta);
                let z = 350 * Math.sin(theta);
                
                // Ha a csatahaj+- k+Âzel+ęben van, oda nem tesz+-nk szikl+ít
                if (Math.sqrt(Math.pow(x - battleship.position.x, 2) + Math.pow(z - battleship.position.z, 2)) < 60) continue;

                let rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(x, 2, z);
                rock.boundingRadius = 5;
                scene.add(rock);
                obstacles.push(rock);
            }

            // H+írty+ík kezdeti felt+Âlt+ęse (mindig 21 darab)
            for(let i=0; i<21; i++) spawnDiamond();
            
            updateScoreBoard();
        }

        function spawnDiamond() {
            let x, z, validPos;
            let attempts = 0;
            
            // A h+írty+ík a b+ízist+-l egyre messzebb jelennek meg, ahogy a baseHarborScore n+Ĺ
            let minDistance = 50 + (baseHarborScore * 10);
            
            do {
                validPos = true;
                let r = minDistance + Math.random() * 150;
                let theta = Math.random() * Math.PI * 2;
                x = BASE_POS.x + r * Math.cos(theta);
                z = BASE_POS.z + r * Math.sin(theta);

                // Ne menjen ki a t+ęrk+ępr+Ĺl
                if (Math.sqrt(x*x + z*z) > 300) { validPos = false; continue; }

                let testVec = new THREE.Vector3(x, 0, z);
                for (let obs of obstacles) {
                    if (testVec.distanceTo(obs.position) < 15) {
                        validPos = false; break;
                    }
                }
                attempts++;
            } while (!validPos && attempts < 100);

            const scrollZone = new THREE.Object3D();
            scrollZone.position.set(x, 0, z);
            
            const pointLight = new THREE.PointLight(0xffd700, 2, 25);
            pointLight.position.set(0, 3, 0);
            scrollZone.add(pointLight);

            const glowGeo = new THREE.CircleGeometry(5, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.5 });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.rotation.x = -Math.PI / 2;
            glowMesh.position.y = 0.5;
            scrollZone.add(glowMesh);
            
            scrollZone.boundingRadius = 5;
            scene.add(scrollZone);
            diamonds.push(scrollZone);
        }

        buildScene();

        // ==========================================
        // 3. J+üT+ëK LOGIKA +ëS IR+üNY+ŹT+üS
        // ==========================================
        const keys = { w: false, a: false, s: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        window.addEventListener('keydown', e => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = true; 
        });
        window.addEventListener('keyup', e => { 
            let k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = false; 
        });

        // Eg+ęr svenkel+ęs (Orbit)
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                let deltaX = e.clientX - previousMousePosition.x;
                cameraAngle -= deltaX * 0.01; // Jobbra-balra h+¦z+ís = Orbit forg+ís
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        
        // Eg+ęr g+Ârg+Ĺ (Zoom)
        window.addEventListener('wheel', (e) => {
            cameraDistance += e.deltaY * 0.05;
            if (cameraDistance < 10) cameraDistance = 10;
            if (cameraDistance > 100) cameraDistance = 100;
        });

        let boatSpeed = 0;
        const MAX_SPEED = 0.6;
        const TURN_SPEED = 0.03;
        let wind = new THREE.Vector3(-0.02, 0, 0.04); // Sz+ęl (+ęszak-nyugati sodr+ís)

        function updatePhysics() {
            if (isGameOver || !playerBoat || document.getElementById('quiz-overlay').style.display === 'flex') return;

            // ---- HAJ+ô IR+üNY+ŹT+üS (Tank controls) ----
            if (keys.w) {
                boatSpeed += 0.02;
                gameStarted = true;
                if(document.getElementById('start-instruction')) document.getElementById('start-instruction').style.display = 'none';
            } else if (keys.s) {
                boatSpeed -= 0.02; // H+ítra
                gameStarted = true;
            } else {
                boatSpeed *= 0.95; // S+¦rl+-d+ís
            }

            // Sebess+ęg limit (h+ítra 0.8x)
            if (boatSpeed > MAX_SPEED) boatSpeed = MAX_SPEED;
            if (boatSpeed < -MAX_SPEED * 0.8) boatSpeed = -MAX_SPEED * 0.8;

            // Fordul+ís (csak ha mozog, vagy egy helyben is tud? Legyen egy helyben is kicsit, mozg+ís k+Âzben jobban)
            if (keys.a) playerBoat.rotation.y += TURN_SPEED;
            if (keys.d) playerBoat.rotation.y -= TURN_SPEED;

            // Mozg+ís alkalmaz+ísa az ir+ínyba
            let direction = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), playerBoat.rotation.y);
            let moveVec = direction.multiplyScalar(boatSpeed);
            
            // Sz+ęl alkalmaz+ísa
            moveVec.add(wind);
            playerBoat.position.add(moveVec);

            // Sz+ęlz+íszl+- friss+şt+ęse
            let windAngle = Math.atan2(wind.x, wind.z);
            windVane.style.transform = 
otate(rad);

            // ---- KAMERA ORBIT +ëS ZOOM ----
            // Billenty+-zet kamera kontroll
            if (keys.arrowleft) cameraAngle -= 0.03;
            if (keys.arrowright) cameraAngle += 0.03;
            if (keys.arrowup) cameraDistance -= 1;
            if (keys.arrowdown) cameraDistance += 1;
            if (cameraDistance < 10) cameraDistance = 10;
            if (cameraDistance > 100) cameraDistance = 100;

            // Kamera poz+şcion+íl+ísa a cs+-nak k+Âr+-l
            let camOffset = new THREE.Vector3(
                Math.sin(cameraAngle) * cameraDistance,
                Math.sin(CAMERA_PITCH) * cameraDistance,
                Math.cos(cameraAngle) * cameraDistance
            );
            camera.position.copy(playerBoat.position).add(camOffset);
            camera.lookAt(playerBoat.position);

            // ---- ELLENS+ëG (L+ëGHAJ+ô) +ťLD+ľZ+ëS ----
            if (enemyShip && gameStarted) {
                let ex = playerBoat.position.x - enemyShip.position.x;
                let ez = playerBoat.position.z - enemyShip.position.z;
                let dist = Math.sqrt(ex*ex + ez*ez);
                if (dist > 0.1) {
                    enemyShip.position.x += (ex/dist) * 0.15;
                    enemyShip.position.z += (ez/dist) * 0.15;
                }
                if (dist < 8) gameOver("Elkapott a L+ęghaj+-!"); // 8 = player r + enemy r
            }

            // ---- +ťTK+ľZ+ëSEK Z+üTONYOKKAL ----
            for (let r of obstacles) {
                let dist = playerBoat.position.distanceTo(r.position);
                if (dist < r.boundingRadius + 2) {
                    // Visszapattan+ís
                    boatSpeed = -boatSpeed * 0.5;
                    playerBoat.position.sub(moveVec.multiplyScalar(2));
                    // Opcion+ílisan: gameOver("Z+ítonyra futott+íl!"); - Most csak lepattan, hacsak nem akarjuk instant game overnek. 
                    // A felhaszn+íl+- +şrta a kor+íbbi logik+íban hogy "z+ítonyra futott+íl". Hagyjuk meg.
                    gameOver("Z+ítonyra futott+íl!");
                }
            }

            // ---- H+üRTYA FELV+ëTEL ----
            for (let i = diamonds.length - 1; i >= 0; i--) {
                let d = diamonds[i];
                if (playerBoat.position.distanceTo(d.position) < d.boundingRadius + 2) {
                    activeDiamond = d;
                    diamonds.splice(i, 1);
                    triggerQuiz();
                }
            }

            // ---- B+üZIS (KIK+ľT+ëS) ----
            if (playerBoat.position.distanceTo(baseHarbor.position) < 35) {
                if (scoreOnBoat > 0) {
                    baseHarborScore += scoreOnBoat;
                    scoreOnBoat = 0;
                    updateScoreBoard();
                    // Sz+ęlv+ędett hely, nem sodr+-dik el azonnal
                    boatSpeed = 0; 
                    // Felt+Âltj+-k 21-re a h+írty+íkat a v+şzen (t+ívolabb!)
                    while(diamonds.length < 21) {
                        spawnDiamond();
                    }
                }
            }
        }

        // ==========================================
        // 4. KV+ŹZ LOGIKA
        // ==========================================
        function triggerQuiz() {
            if (quizQuestions.length === 0) {
                resumeGame(true);
                return;
            }
            let qIndex = Math.floor(Math.random() * quizQuestions.length);
            let q = quizQuestions[qIndex];
            correctAnswer = q.correctAnswer;
            
            document.getElementById('quiz-question').innerText = q.question;
            
            let answers = [q.correctAnswer, ...q.incorrectAnswers].sort(() => Math.random() - 0.5);
            let btnContainer = document.getElementById('answer-buttons');
            btnContainer.innerHTML = '';
            
            if (q.isStaked && playerToken) {
                btnContainer.style.display = 'none';
                document.getElementById('betting-area').style.display = 'flex';
                document.getElementById('bet-input').value = '';
            } else {
                document.getElementById('betting-area').style.display = 'none';
                btnContainer.style.display = 'grid';
                answers.forEach(ans => {
                    let btn = document.createElement('button');
                    btn.className = 'answer-btn';
                    btn.innerText = ans;
                    btn.onclick = () => handleAnswer(ans === correctAnswer);
                    btnContainer.appendChild(btn);
                });
            }
            document.getElementById('quiz-overlay').style.display = 'flex';
            
            timeLeft = 20;
            document.getElementById('timer-bar').style.width = '100%';
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft / 20 * 100) + '%';
                if (timeLeft <= 0) handleAnswer(false);
            }, 100);
        }

        if(document.getElementById('place-bet-btn')) {
            document.getElementById('place-bet-btn').onclick = () => {
                currentBet = parseInt(document.getElementById('bet-input').value);
                if (isNaN(currentBet) || currentBet <= 0 || currentBet > maxBetAmount) {
                    alert("+ërv+ęnytelen t+ęt!"); return;
                }
                document.getElementById('betting-area').style.display = 'none';
                document.getElementById('answer-buttons').style.display = 'grid';
            };
        }

        async function handleAnswer(isCorrect) {
            clearInterval(timerInterval);
            document.getElementById('quiz-overlay').style.display = 'none';

            if (currentBet > 0) {
                try { await callBackend('handleBetTransaction', [currentBet, isCorrect]); } catch(e) {}
            }
            currentBet = 0;
            resumeGame(isCorrect);
        }

        function resumeGame(isCorrect) {
            if (isCorrect) {
                scoreOnBoat++;
                updateScoreBoard();
            }
            
            if (activeDiamond) {
                scene.remove(activeDiamond);
                activeDiamond = null;
            }
            // A h+írty+ík sz+íma mindig +ílland+- 21 marad, ha vesz+ştett, +¦jat spawnolunk helyette
            if (!isCorrect) spawnDiamond(); 
        }

        function gameOver(msg) {
            isGameOver = true;
            if(document.getElementById('game-message')) {
                document.getElementById('game-message').innerText = msg;
                document.getElementById('game-message').style.display = 'block';
            }
            
            // J+ít+ęk v+ęg+ęn a b+ízis pontsz+ím+ínak ment+ęse
            if (baseHarborScore > 0) saveScoreToBackend();
        }

        async function saveScoreToBackend() {
            try { await callBackend('saveHartyaScore', [baseHarborScore]); } catch(e) {}
        }

        // ==========================================
        // 5. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script></script>
</body>
</html>
