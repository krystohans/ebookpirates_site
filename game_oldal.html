<!-- GAME_OLDAL - A Játékmenet Univerzális Megjelenítője -->
<div id="game_oldal" class="page-container" style="width: 100vw; height: 100vh; background-color: #000; color: #fff; overflow: hidden; position: relative; touch-action: none; user-select: none;" oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">
  
  <!-- Multimédia Megjelenítő (Videó / Kép Fallback) -->
  <div id="game-media-container" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;">
    <video id="game-video-player" style="width: 100%; height: 100%; object-fit: cover; display: none; pointer-events: none;" playsinline autoplay muted></video>
    <img id="game-fallback-image" style="width: 100%; height: 100%; object-fit: cover; display: none; pointer-events: none;" alt="Jelenet képe">
  </div>

  <!-- Narratíva és Döntési Felület -->
  <div id="game-narrative-overlay" style="position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 800px; background: rgba(15, 15, 15, 0.9); border: 2px solid #8b6d3b; box-shadow: 0 0 20px rgba(0,0,0,0.8); padding: 25px; border-radius: 8px; z-index: 20; display: none; text-align: center;">
    <p id="game-narrative-text" style="font-size: 1.2rem; margin-bottom: 25px; line-height: 1.6; color: #ddd;">[Narratíva helye]</p>
    <div id="game-actions-container" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
      <!-- A gombok (Tovább, Képzettségpróba, stb.) dinamikusan kerülnek ide -->
    </div>
  </div>

  <!-- Minijáték Container (iframe) -->
  <div id="game-minigame-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30; display: none; overflow: hidden; touch-action: none;">
    <iframe id="game-minigame-frame" style="width: 100%; height: 100%; border: none; background: transparent; overflow: hidden;" scrolling="no"></iframe>
  </div>

</div>
