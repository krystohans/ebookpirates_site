<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hártyavadász 3D</title>
    <style>
        /* Alapvető beállítások */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Georgia', serif; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI réteg */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .glass-panel {
            background: rgba(100, 10, 15, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #eaddb5;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #top-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between;
            min-width: 300px;
        }
        
        #top-bar h1 { margin: 0; font-size: 24px; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        #score-board { font-size: 20px; font-weight: bold; }

        /* Kvíz Overlay */
        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 20; pointer-events: auto;
        }
        
        #quiz-panel {
            width: 80%; max-width: 600px; padding: 40px; text-align: center;
            display: flex; flex-direction: column; gap: 20px;
        }

        #quiz-question { font-size: 24px; font-weight: bold; color: #fff; line-height: 1.5; text-shadow: 2px 2px 4px #000; }
        
        #timer-bar-container { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #4CAF50; transition: width 0.1s linear; }

        .answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn {
            background-image: url('assets/ovalis_gomb-rw.png');
            background-size: 100% 100%;
            background-color: transparent;
            background-repeat: no-repeat;
            border: none; color: #fffbcc;
            padding: 20px 30px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }
        .answer-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .old-btn { 
            background: linear-gradient(180deg, #8a5a19 0%, #3a2205 100%);
            border: 2px solid #d4af37; border-radius: 8px; color: #fffbcc;
            padding: 15px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold;
        }
        .answer-btn:hover { transform: scale(1.05); border-color: #fff; }

        /* Tétes felület */
        #betting-area { display: none; flex-direction: column; align-items: center; gap: 15px; }
        #bet-input {
            padding: 10px; font-size: 20px; text-align: center; width: 150px;
            background: rgba(0,0,0,0.5); color: #d4af37; border: 2px solid #d4af37; border-radius: 8px;
        }
        #place-bet-btn {
            background: #2E7D32; color: white; border: 2px solid #4CAF50; padding: 12px 30px;
            font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #place-bet-btn:hover { background: #4CAF50; }

        /* Érintő Joystick */
        #joystick-area {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,215,0,0.3);
            display: none; pointer-events: auto; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: rgba(212, 175, 55, 0.6); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #game-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; color: #fff; text-shadow: 0 0 20px red; font-weight: bold; display: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="top-bar" class="glass-panel">
            <h1>Hártyavadász</h1>
            <div id="score-board">Hártyák: 0</div>
        </div>
        
        <div id="joystick-area">
            <div id="joystick-knob"></div>
        </div>

        <div id="game-message">Játék Vége!</div>
        <div id="start-instruction" style="position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #fff; text-shadow: 0 0 10px #000; text-align: center; pointer-events: none;">Nyomd meg a W-A-S-D gombokat az induláshoz!<br><span style="font-size: 16px; color: #d4af37;">(Szedj össze hártyákat, és kerüld el a léghajót!)</span></div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-panel" class="glass-panel">
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
            <div id="quiz-question">Kérdés betöltése...</div>
            
            <div id="answer-buttons" class="answer-buttons"></div>
            
            <div id="betting-area">
                <div id="max-bet-info">Maximális tét lekérdezése...</div>
                <input type="number" id="bet-input" min="1" placeholder="Tét">
                <button id="place-bet-btn">Tét Megtétele</button>
            </div>
        </div>
    </div>

    <!-- Three.js és GLTFLoader betöltése -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader kikapcsolva az 1. fázisra -->

    <script>
        // ==========================================
        // 1. GLOBÁLIS VÁLTOZÓK ÉS KOMMUNIKÁCIÓ
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const playerToken = urlParams.get('token');
        
        let quizQuestions = [];
        let usedQuestions = [];
        let score = 0;
        let isGameOver = false;
        let gameStarted = false;
        let currentBet = 0;
        let maxBetAmount = 0;
        let correctAnswer = "";
        let activeDiamond = null;
        let timerInterval;
        let timeLeft = 20;

        // Háttérkommunikáció a szülő ablakkal (ahol az apiRouter fut)
        function callBackend(action, params) {
            return new Promise((resolve, reject) => {
                const messageId = 'msg_' + Math.random().toString(36).substr(2, 9);
                const listener = (event) => {
                    if (event.data && event.data.messageId === messageId) {
                        window.removeEventListener('message', listener);
                        if (event.data.error) reject(event.data.error);
                        else resolve(event.data.response);
                    }
                };
                window.addEventListener('message', listener);
                window.parent.postMessage({ type: 'backendCall', action: action, params: params, messageId: messageId }, '*');
            });
        }

        // Kérdések betöltése
        async function initGameData() {
            try {
                const response = await callBackend('getQuizQuestions', []);
                quizQuestions = response || [];
                console.log(quizQuestions.length + " kérdés betöltve.");
                
                const betResponse = await callBackend('getMaximumBet', []);
                maxBetAmount = betResponse || 0;
                document.getElementById('max-bet-info').innerText = "Maximális tét: " + maxBetAmount;
            } catch (e) {
                console.error("Adatbetöltési hiba:", e);
            }
        }
        initGameData();

        // ==========================================
        // 2. THREE.JS MOTOR INICIALIZÁLÁS
        // ==========================================
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Nappali kék ég
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        // Kamera felülnézetből, enyhe dőléssel
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Fények
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeeb1, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Víz felület
        const waterGeo = new THREE.PlaneGeometry(200, 200);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, opacity: 0.9, transparent: true, opacity: 0.8, roughness: 0.1, metalness: 0.8 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.receiveShadow = true;
        scene.add(water);

        // Játék elemek tömbjei
        let playerBoat = null;
        let baseHarbor = null;
        let enemyShip = null;
        const obstacles = [];
        const diamonds = [];

        // Pálya építése (1. Fázis: Primitívek és Gauss-eloszlás)
        function buildScene() {
            const MAP_RADIUS = 300;
            const HARBOR_RADIUS = 30;

            // 1. Kikötő (Bázis) - Zöld lapos henger középen
            const harborGeo = new THREE.CylinderGeometry(HARBOR_RADIUS, HARBOR_RADIUS, 1, 32);
            const harborMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            baseHarbor = new THREE.Mesh(harborGeo, harborMat);
            baseHarbor.position.set(0, 0, 0);
            baseHarbor.receiveShadow = true;
            scene.add(baseHarbor);

            // 2. Játékos csónakja - Barna doboz a kikötő szélén
            const boatGeo = new THREE.BoxGeometry(4, 2, 8);
            const boatMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            playerBoat = new THREE.Mesh(boatGeo, boatMat);
            playerBoat.position.set(0, 1, HARBOR_RADIUS - 10);
            playerBoat.castShadow = true;
            scene.add(playerBoat);

            // 3. Üldöző hajó (Léghajó) - Piros gömb, messzebb indul
            const enemyGeo = new THREE.SphereGeometry(6, 16, 16);
            const enemyMat = new THREE.MeshStandardMaterial({ color: 0xB22222 });
            enemyShip = new THREE.Mesh(enemyGeo, enemyMat);
            enemyShip.position.set(150, 5, 150);
            enemyShip.castShadow = true;
            scene.add(enemyShip);

            // 4. Zátonyok Gauss-eloszlással
            // Minél messzebb vagyunk a bázistól, annál sűrűbb, a szélén pedig összefüggő fal.
            const totalRocks = 300;
            const rockGeo = new THREE.CylinderGeometry(3, 4, 6, 8);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

            for(let i = 0; i < totalRocks; i++) {
                // Sugár (távolság a központtól) generálása
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                let num = Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
                num = num / 10.0 + 0.5; // Középérték felé húz
                if (num > 1 || num < 0) num = Math.random(); // Fallback
                
                // A zátonyok a kikötőn kívül (R > HARBOR_RADIUS + 20) és a falig (MAP_RADIUS)
                let r = (HARBOR_RADIUS + 20) + Math.pow(num, 0.5) * (MAP_RADIUS - HARBOR_RADIUS - 20);
                let theta = Math.random() * 2 * Math.PI;

                let x = r * Math.cos(theta);
                let z = r * Math.sin(theta);

                let rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(x, 1, z);
                rock.rotation.x = (Math.random() - 0.5) * 0.4;
                rock.rotation.z = (Math.random() - 0.5) * 0.4;
                rock.castShadow = true;
                rock.receiveShadow = true;
                rock.boundingRadius = 4; // Gyors ütközésvizsgálathoz
                
                scene.add(rock);
                obstacles.push(rock);
            }

            // A térkép szélét jelentő összefüggő gyűrű (áthatolhatatlan)
            for(let theta = 0; theta < Math.PI * 2; theta += 0.05) {
                let x = MAP_RADIUS * Math.cos(theta);
                let z = MAP_RADIUS * Math.sin(theta);
                let rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(x, 1, z);
                rock.boundingRadius = 4;
                scene.add(rock);
                obstacles.push(rock);
            }

            spawnDiamond();
        }

        // Hártya generálása (Csak fény a vízen)
        function spawnDiamond() {
            // Generálás egy hajózható, szabad területre
            let x, z, validPos;
            let attempts = 0;
            do {
                validPos = true;
                // Maximum R = 250 körzeten belül
                let r = 50 + Math.random() * 200;
                let theta = Math.random() * Math.PI * 2;
                x = r * Math.cos(theta);
                z = r * Math.sin(theta);

                // Megnézzük, hogy nincs-e túl közel egy zátonyhoz
                let testVec = new THREE.Vector3(x, 0, z);
                for (let obs of obstacles) {
                    if (testVec.distanceTo(obs.position) < 15) {
                        validPos = false; break;
                    }
                }
                attempts++;
            } while (!validPos && attempts < 100);

            // Nincs 3D modell, csak egy arany fényforrás és egy láthatatlan zóna
            const scrollZone = new THREE.Object3D();
            scrollZone.position.set(x, 0, z);
            
            const pointLight = new THREE.PointLight(0xffd700, 2, 30);
            pointLight.position.set(0, 5, 0);
            scrollZone.add(pointLight);

            // Egy nagyon enyhe áttetsző sík a vizen, hogy látszódjon a folt
            const glowGeo = new THREE.CircleGeometry(4, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.4 });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.rotation.x = -Math.PI / 2;
            glowMesh.position.y = 0.5;
            scrollZone.add(glowMesh);
            
            scrollZone.boundingRadius = 4;
            scene.add(scrollZone);
            diamonds.push(scrollZone);
        }

        buildScene();

        // ==========================================
        // 3. JÁTÉK LOGIKA ÉS IRÁNYÍTÁS
        // ==========================================
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        let playerSpeed = 0.3;
        let wind = new THREE.Vector3(0.02, 0, 0.05);

        function updatePhysics() {
            if (isGameOver || !playerBoat || document.getElementById('quiz-overlay').style.display === 'flex') return;

            // Játékos mozgás
            let dx = 0, dz = 0;
            if (keys.w) dz -= 1; if (keys.s) dz += 1;
            if (keys.a) dx -= 1; if (keys.d) dx += 1;

            if (dx !== 0 || dz !== 0) {
                gameStarted = true;
                document.getElementById('start-instruction').style.display = 'none';
                let angle = Math.atan2(dx, dz);
                playerBoat.rotation.y = angle; // Hajó beforgatása
                playerBoat.position.x += dx * playerSpeed;
                playerBoat.position.z += dz * playerSpeed;
            }

            // Szél sodrása
            playerBoat.position.add(wind);

            // Kamera követi a hajót (sima interpolációval)
            camera.position.x += (playerBoat.position.x - camera.position.x) * 0.05;
            camera.position.z += (playerBoat.position.z + 20 - camera.position.z) * 0.05;

            // Ellenség üldözése
            if (enemyShip && gameStarted) {
                let ex = playerBoat.position.x - enemyShip.position.x;
                let ez = playerBoat.position.z - enemyShip.position.z;
                let dist = Math.sqrt(ex*ex + ez*ez);
                if (dist > 0.1) {
                    enemyShip.position.x += (ex/dist) * 0.08;
                    enemyShip.position.z += (ez/dist) * 0.08;
                    enemyShip.rotation.y = Math.atan2(ex, ez);
                }
                
                // Ütközés ellenséggel
                if (dist < 4) gameOver("Elkapott a Léghajó!");
            }

            // Ütközés zátonyokkal
            for (let r of obstacles) {
                let dist = playerBoat.position.distanceTo(r.position);
                if (dist < r.boundingRadius + 2) gameOver("Zátonyra futottál!");
            }

            // Ütközés hártyával
            for (let i = diamonds.length - 1; i >= 0; i--) {
                let d = diamonds[i];
                d.rotation.y += 0.02; // Forog
                d.position.y = 1 + Math.sin(Date.now() * 0.003) * 0.5; // Lebeg
                
                if (playerBoat.position.distanceTo(d.position) < d.boundingRadius + 2) {
                    activeDiamond = d;
                    diamonds.splice(i, 1);
                    triggerQuiz();
                }
            }

            // Győzelem ellenőrzése (ha nincs több hártya és a kikötőben vagyunk)
            if (diamonds.length === 0 && baseHarbor) {
                if (playerBoat.position.distanceTo(baseHarbor.position) < 8) {
                    gameOver("Sikeres Expedíció!");
                    saveScoreToBackend();
                }
            }
        }

        async function saveScoreToBackend() {
            if (score > 0) {
                try {
                    await callBackend('saveHartyaScore', [score]);
                    console.log("Pontszám elmentve!");
                } catch(e) { console.error("Mentési hiba", e); }
            }
        }

        function gameOver(msg) {
            isGameOver = true;
            document.getElementById('game-message').innerText = msg;
            document.getElementById('game-message').style.display = 'block';
        }

        // ==========================================
        // 4. KVÍZ LOGIKA
        // ==========================================
        function triggerQuiz() {
            if (quizQuestions.length === 0) {
                resumeGame(true);
                return;
            }

            let qIndex = Math.floor(Math.random() * quizQuestions.length);
            let q = quizQuestions[qIndex];
            correctAnswer = q.correctAnswer;
            
            document.getElementById('quiz-question').innerText = q.question;
            
            let answers = [q.correctAnswer, ...q.incorrectAnswers].sort(() => Math.random() - 0.5);
            let btnContainer = document.getElementById('answer-buttons');
            btnContainer.innerHTML = '';
            
            if (q.isStaked && playerToken) {
                btnContainer.style.display = 'none';
                document.getElementById('betting-area').style.display = 'flex';
                document.getElementById('bet-input').value = '';
            } else {
                document.getElementById('betting-area').style.display = 'none';
                btnContainer.style.display = 'grid';
                answers.forEach(ans => {
                    let btn = document.createElement('button');
                    btn.className = 'answer-btn';
                    btn.innerText = ans;
                    btn.onclick = () => handleAnswer(ans === correctAnswer);
                    btnContainer.appendChild(btn);
                });
            }

            document.getElementById('quiz-overlay').style.display = 'flex';
            
            timeLeft = 20;
            document.getElementById('timer-bar').style.width = '100%';
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft / 20 * 100) + '%';
                if (timeLeft <= 0) handleAnswer(false);
            }, 100);
        }

        document.getElementById('place-bet-btn').onclick = () => {
            currentBet = parseInt(document.getElementById('bet-input').value);
            if (isNaN(currentBet) || currentBet <= 0 || currentBet > maxBetAmount) {
                alert("Érvénytelen tét!"); return;
            }
            document.getElementById('betting-area').style.display = 'none';
            document.getElementById('answer-buttons').style.display = 'grid';
        };

        async function handleAnswer(isCorrect) {
            clearInterval(timerInterval);
            document.getElementById('quiz-overlay').style.display = 'none';

            if (currentBet > 0) {
                try {
                    await callBackend('handleBetTransaction', [currentBet, isCorrect]);
                } catch(e) { console.error("Tranzakciós hiba", e); }
            }

            currentBet = 0;
            resumeGame(isCorrect);
        }

        function resumeGame(isCorrect) {
            if (isCorrect) {
                score++;
                document.getElementById('score-board').innerText = "Hártyák: " + score;
            }
            
            if (activeDiamond) {
                scene.remove(activeDiamond);
                activeDiamond = null;
            }
            // Ha kell még hártya, spawnoljunk
            if (score < 3) spawnDiamond(); // Pl. 3-at kell összeszedni
        }

        // ==========================================
        // 5. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
