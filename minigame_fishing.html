<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hártyavadász 3D</title>
    <style>
        /* Alapvető beállítások */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Georgia', serif; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI réteg */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .glass-panel {
            background: rgba(100, 10, 15, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #eaddb5;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #top-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; display: flex; align-items: center; justify-content: space-between;
            min-width: 300px;
        }
        
        #top-bar h1 { margin: 0; font-size: 24px; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        #score-board { font-size: 20px; font-weight: bold; }

        /* Kvíz Overlay */
        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 20; pointer-events: auto;
        }
        
        #quiz-panel {
            width: 80%; max-width: 600px; padding: 40px; text-align: center;
            display: flex; flex-direction: column; gap: 20px;
        }

        #quiz-question { font-size: 24px; font-weight: bold; color: #fff; line-height: 1.5; text-shadow: 2px 2px 4px #000; }
        
        #timer-bar-container { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #4CAF50; transition: width 0.1s linear; }

        .answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn {
            background-image: url('assets/ovalis_gomb-rw.png');
            background-size: 100% 100%;
            background-color: transparent;
            background-repeat: no-repeat;
            border: none; color: #fffbcc;
            padding: 20px 30px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }
        .answer-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .old-btn { 
            background: linear-gradient(180deg, #8a5a19 0%, #3a2205 100%);
            border: 2px solid #d4af37; border-radius: 8px; color: #fffbcc;
            padding: 15px; font-size: 18px; cursor: pointer; transition: transform 0.2s;
            font-family: 'Georgia', serif; font-weight: bold;
        }
        .answer-btn:hover { transform: scale(1.05); border-color: #fff; }

        /* Tétes felület */
        #betting-area { display: none; flex-direction: column; align-items: center; gap: 15px; }
        #bet-input {
            padding: 10px; font-size: 20px; text-align: center; width: 150px;
            background: rgba(0,0,0,0.5); color: #d4af37; border: 2px solid #d4af37; border-radius: 8px;
        }
        #place-bet-btn {
            background: #2E7D32; color: white; border: 2px solid #4CAF50; padding: 12px 30px;
            font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #place-bet-btn:hover { background: #4CAF50; }

        /* Érintő Joystick */
        #joystick-area {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,215,0,0.3);
            display: none; pointer-events: auto; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: rgba(212, 175, 55, 0.6); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #game-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; color: #fff; text-shadow: 0 0 20px red; font-weight: bold; display: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="top-bar" class="glass-panel">
            <h1>Hártyavadász</h1>
            <div id="score-board">Hártyák: 0</div>
        </div>
        
        <div id="joystick-area">
            <div id="joystick-knob"></div>
        </div>

        <div id="game-message">Játék Vége!</div>
        <div id="start-instruction" style="position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #fff; text-shadow: 0 0 10px #000; text-align: center; pointer-events: none;">Nyomd meg a W-A-S-D gombokat az induláshoz!<br><span style="font-size: 16px; color: #d4af37;">(Szedj össze hártyákat, és kerüld el a léghajót!)</span></div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-panel" class="glass-panel">
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
            <div id="quiz-question">Kérdés betöltése...</div>
            
            <div id="answer-buttons" class="answer-buttons"></div>
            
            <div id="betting-area">
                <div id="max-bet-info">Maximális tét lekérdezése...</div>
                <input type="number" id="bet-input" min="1" placeholder="Tét">
                <button id="place-bet-btn">Tét Megtétele</button>
            </div>
        </div>
    </div>

    <!-- 2D Canvas Motor -->
    <script>
        // ==========================================
        // 1. GLOBÁLIS VÁLTOZÓK ÉS KOMMUNIKÁCIÓ
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const playerToken = urlParams.get('token');
        
        let quizQuestions = [];
        let score = 0;
        let isGameOver = false;
        let gameStarted = false;
        let currentBet = 0;
        let maxBetAmount = 0;
        let correctAnswer = "";
        let activeDiamond = null;
        let timerInterval;
        let timeLeft = 20;

        function callBackend(action, params) {
            return new Promise((resolve, reject) => {
                const messageId = 'msg_' + Math.random().toString(36).substr(2, 9);
                const listener = (event) => {
                    if (event.data && event.data.messageId === messageId) {
                        window.removeEventListener('message', listener);
                        if (event.data.error) reject(event.data.error);
                        else resolve(event.data.response);
                    }
                };
                window.addEventListener('message', listener);
                window.parent.postMessage({ type: 'backendCall', action: action, params: params, messageId: messageId }, '*');
            });
        }

        async function initGameData() {
            try {
                const response = await callBackend('getQuizQuestions', []);
                quizQuestions = response || [];
                const betResponse = await callBackend('getMaximumBet', []);
                maxBetAmount = betResponse || 0;
                document.getElementById('max-bet-info').innerText = "Maximális tét: " + maxBetAmount;
            } catch (e) { console.error("Hiba", e); }
        }
        initGameData();

        // ==========================================
        // 2. 2D CANVAS INICIALIZÁLÁS
        // ==========================================
        const container = document.getElementById('game-container');
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ==========================================
        // 3. JÁTÉK ENTITÁSOK
        // ==========================================
        let camera = { x: 0, y: 0 };
        let zoom = 1.0;
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let cameraAutoFollow = true;
        let player = { x: 0, y: 0, speed: 3, radius: 15, angle: 0 };
        let enemy = { x: 800, y: -800, speed: 1, radius: 25, active: true };
        let harbor = { x: 0, y: -400, radius: 60 };
        let obstacles = [];
        let scrolls = [];
        let wind = { dx: -0.2, dy: 0.5 };

        // Zátonyok generálása
        for(let i=0; i<15; i++) {
            obstacles.push({
                x: (Math.random() - 0.5) * 2000,
                y: (Math.random() - 0.5) * 2000,
                radius: 20 + Math.random() * 30
            });
        }

        function spawnScroll() {
            scrolls.push({
                x: player.x + (Math.random() - 0.5) * 1000,
                y: player.y + (Math.random() - 0.5) * 1000,
                radius: 12
            });
        }
        spawnScroll();

        const keys = { w: false, a: false, s: false, d: false };

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
            cameraAutoFollow = false; // Ha egeret húz, kikapcsoljuk az automatikus követést
            document.body.style.cursor = 'grabbing';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.cursor = 'default';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            let dx = e.clientX - lastMouse.x;
            let dy = e.clientY - lastMouse.y;
            camera.x -= dx / zoom;
            camera.y -= dy / zoom;
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            let zoomAmount = e.deltaY > 0 ? 0.9 : 1.1;
            let newZoom = zoom * zoomAmount;
            if (newZoom >= 0.2 && newZoom <= 3.0) {
                // Zoom center to mouse position
                let mouseWorldX = camera.x + e.clientX / zoom;
                let mouseWorldY = camera.y + e.clientY / zoom;
                
                zoom = newZoom;
                
                camera.x = mouseWorldX - e.clientX / zoom;
                camera.y = mouseWorldY - e.clientY / zoom;
            }
        });
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // ==========================================
        // 4. JÁTÉK LOGIKA
        // ==========================================
        function update() {
            if (isGameOver || document.getElementById('quiz-overlay').style.display === 'flex') return;

            let dx = 0, dy = 0;
            if (keys.w) dy -= 1; if (keys.s) dy += 1;
            if (keys.a) dx -= 1; if (keys.d) dx += 1;

            if (dx !== 0 || dy !== 0) {
                gameStarted = true;
                document.getElementById('start-instruction').style.display = 'none';
                player.angle = Math.atan2(dy, dx);
                let length = Math.sqrt(dx*dx + dy*dy);
                player.x += (dx/length) * player.speed;
                player.y += (dy/length) * player.speed;
            }

            // Szél
            player.x += wind.dx;
            player.y += wind.dy;

            // Kamera követi a játékost
            if (cameraAutoFollow) {
                camera.x += (player.x - (canvas.width/2)/zoom - camera.x) * 0.1;
                camera.y += (player.y - (canvas.height/2)/zoom - camera.y) * 0.1;
            } else if (dx !== 0 || dy !== 0) {
                // Ha mozgunk WASD-vel, újra ráfókuszál a kamerával
                cameraAutoFollow = true;
            }

            // Léghajó üldöz
            if (gameStarted && enemy.active) {
                let ex = player.x - enemy.x;
                let ey = player.y - enemy.y;
                let dist = Math.sqrt(ex*ex + ey*ey);
                if (dist > 0) {
                    enemy.x += (ex/dist) * enemy.speed;
                    enemy.y += (ey/dist) * enemy.speed;
                }
                if (dist < player.radius + enemy.radius) gameOver("Elkapott a Léghajó!");
            }

            // Ütközés zátonyokkal
            for (let r of obstacles) {
                let dist = Math.sqrt(Math.pow(player.x - r.x, 2) + Math.pow(player.y - r.y, 2));
                if (dist < player.radius + r.radius) gameOver("Zátonyra futottál!");
            }

            // Ütközés hártyával
            for (let i = scrolls.length - 1; i >= 0; i--) {
                let s = scrolls[i];
                let dist = Math.sqrt(Math.pow(player.x - s.x, 2) + Math.pow(player.y - s.y, 2));
                if (dist < player.radius + s.radius + 10) {
                    activeDiamond = s;
                    scrolls.splice(i, 1);
                    triggerQuiz();
                }
            }

            // Győzelem
            if (scrolls.length === 0) {
                let dist = Math.sqrt(Math.pow(player.x - harbor.x, 2) + Math.pow(player.y - harbor.y, 2));
                if (dist < player.radius + harbor.radius) {
                    gameOver("Sikeres Expedíció!");
                    saveScoreToBackend();
                }
            }
        }

        async function saveScoreToBackend() {
            if (score > 0) {
                try { await callBackend('saveHartyaScore', [score]); } catch(e) {}
            }
        }

        function gameOver(msg) {
            isGameOver = true;
            document.getElementById('game-message').innerText = msg;
            document.getElementById('game-message').style.display = 'block';
        }

        // ==========================================
        // 5. RENDERELÉS (2D KÉPRE)
        // ==========================================
        function draw() {
            // Tenger
            ctx.fillStyle = '#005588';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(zoom, zoom);
            ctx.translate(-camera.x, -camera.y);

            // Háttér rács (hogy látszódjon a mozgás)
            ctx.strokeStyle = '#006699';
            ctx.lineWidth = 1;
            let startX = Math.floor(camera.x / 100) * 100 - 1000;
            let startY = Math.floor(camera.y / 100) * 100 - 1000;
            let endX = startX + (canvas.width / zoom) + 2000;
            let endY = startY + (canvas.height / zoom) + 2000;
            for(let x = startX; x < endX; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
            }
            for(let y = startY; y < endY; y += 100) {
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
            }

            // Kikötő (Zöld sziget)
            ctx.fillStyle = '#2E7D32';
            ctx.beginPath(); ctx.arc(harbor.x, harbor.y, harbor.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = "20px Arial";
            ctx.fillText("Kikötő", harbor.x - 30, harbor.y);

            // Zátonyok (Szürke körök)
            ctx.fillStyle = '#555';
            for (let r of obstacles) {
                ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); ctx.fill();
            }

            // Hártyák (Arany sárga)
            ctx.fillStyle = '#FFD700';
            for (let s of scrolls) {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius + Math.sin(Date.now()*0.005)*3, 0, Math.PI*2); ctx.fill();
            }

            // Játékos (Sötét fa csónak)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(-15, -10, 30, 20); // Test
            ctx.fillStyle = '#A0522D';
            ctx.beginPath(); ctx.moveTo(15, -10); ctx.lineTo(25, 0); ctx.lineTo(15, 10); ctx.fill(); // Orr
            ctx.restore();

            // Léghajó (Piros nagy kör)
            if (enemy.active) {
                ctx.fillStyle = '#B22222';
                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = "14px Arial";
                ctx.fillText("Léghajó", enemy.x - 25, enemy.y + 5);
            }

            ctx.restore();
        }

        function loop() {
            requestAnimationFrame(loop);
            update();
            draw();
        }
        loop();

        // Kvíz UI logika változatlan
        function triggerQuiz() {
            if (quizQuestions.length === 0) { resumeGame(true); return; }
            let qIndex = Math.floor(Math.random() * quizQuestions.length);
            let q = quizQuestions[qIndex];
            correctAnswer = q.correctAnswer;
            document.getElementById('quiz-question').innerText = q.question;
            
            let answers = [q.correctAnswer, ...q.incorrectAnswers].sort(() => Math.random() - 0.5);
            let btnContainer = document.getElementById('answer-buttons');
            btnContainer.innerHTML = '';
            
            if (q.isStaked && playerToken) {
                btnContainer.style.display = 'none';
                document.getElementById('betting-area').style.display = 'flex';
                document.getElementById('bet-input').value = '';
            } else {
                document.getElementById('betting-area').style.display = 'none';
                btnContainer.style.display = 'grid';
                answers.forEach(ans => {
                    let btn = document.createElement('button');
                    btn.className = 'answer-btn';
                    btn.innerText = ans;
                    btn.onclick = () => handleAnswer(ans === correctAnswer);
                    btnContainer.appendChild(btn);
                });
            }
            document.getElementById('quiz-overlay').style.display = 'flex';
            timeLeft = 20;
            document.getElementById('timer-bar').style.width = '100%';
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/20*100) + '%';
                if (timeLeft <= 0) handleAnswer(false);
            }, 100);
        }

        document.getElementById('place-bet-btn').onclick = () => {
            currentBet = parseInt(document.getElementById('bet-input').value);
            if (isNaN(currentBet) || currentBet <= 0 || currentBet > maxBetAmount) { alert("Érvénytelen tét!"); return; }
            document.getElementById('betting-area').style.display = 'none';
            document.getElementById('answer-buttons').style.display = 'grid';
        };

        async function handleAnswer(isCorrect) {
            clearInterval(timerInterval);
            document.getElementById('quiz-overlay').style.display = 'none';
            if (currentBet > 0) { try { await callBackend('handleBetTransaction', [currentBet, isCorrect]); } catch(e) {} }
            currentBet = 0;
            resumeGame(isCorrect);
        }

        function resumeGame(isCorrect) {
            if (isCorrect) {
                score++;
                document.getElementById('score-board').innerText = "Hártyák: " + score;
            }
            activeDiamond = null;
            if (score < 3) spawnScroll(); 
        }
    </script>

</body>
</html>
