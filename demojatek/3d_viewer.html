<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBookPirates - 3D GLB Modell Nézegető</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #110d08;
            font-family: 'Georgia', serif;
            color: #fffbcc;
        }

        /* 3D Canvas */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(26, 15, 5, 0.85);
            border: 2px solid #8b5a2b;
            border-radius: 12px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 20px;
            margin: 0 0 15px 0;
            border-bottom: 2px solid #8b5a2b;
            padding-bottom: 8px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .section {
            margin-bottom: 15px;
        }

        .label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            color: #d4b28c;
        }

        /* Drag & Drop Area */
        #drop-zone {
            border: 2px dashed #8b5a2b;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: rgba(139, 90, 43, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #drop-zone:hover, #drop-zone.dragover {
            background: rgba(139, 90, 43, 0.25);
            border-color: #fffbcc;
        }

        #file-input {
            display: none;
        }

        /* Controls */
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: #8b5a2b;
            border: 1px solid #5a3818;
            color: #fffbcc;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #a06b3a;
        }

        /* Model Stats */
        #stats-panel {
            font-size: 12px;
            line-height: 1.5;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        /* Loading Spinner */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #8b5a2b;
        }

        #help-tip {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
        }
    </style>

    <!-- Three.js + OrbitControls + GLTFLoader via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>3D GLB Nézegető</h1>
        
        <div class="section">
            <span class="label">GLB Modell betöltése</span>
            <div id="drop-zone">
                <div style="font-size: 30px; margin-bottom: 5px;">📦</div>
                Húzz ide fájlokat vagy mappát!
                <div style="display: flex; gap: 8px; margin-top: 10px; justify-content: center;">
                    <button class="btn" style="margin: 0; padding: 6px 12px; font-size: 12px; width: auto;" onclick="document.getElementById('file-input').click()">Fájlok</button>
                    <button class="btn" style="margin: 0; padding: 6px 12px; font-size: 12px; width: auto;" onclick="document.getElementById('folder-input').click()">Mappa</button>
                </div>
            </div>
            <input type="file" id="file-input" accept=".glb" multiple style="display: none;">
            <input type="file" id="folder-input" webkitdirectory directory style="display: none;">
        </div>

        <div class="section" id="options-panel">
            <span class="label">Beállítások</span>
            <button class="btn" onclick="toggleGrid()">Segédrács ki/be</button>
            <button class="btn" onclick="resetCamera()">Kamera visszaállítása</button>
        </div>

        <div class="section">
            <div id="stats-panel">
                <strong>Modell információk:</strong><br>
                Név: <span id="model-name">-</span><br>
                Méret: <span id="model-size">-</span><br>
                Geometria: <span id="model-polys">-</span> poligon
                
                <!-- OD-VISSZA LÉPTETŐ PANEL -->
                <div id="navigation-panel" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #8b5a2b; padding-top: 15px;">
                    <button id="prev-btn" onclick="stepFile(-1)" style="background: #8b5a2b; border: 1px solid #5a3818; color: #fffbcc; padding: 6px 12px; font-size: 13px; font-family: 'Georgia', serif; font-weight: bold; border-radius: 4px; cursor: pointer;" disabled>← Előző</button>
                    <span id="file-counter" style="font-size: 12px; font-weight: bold; color: #d4b28c;">0 / 0</span>
                    <button id="next-btn" onclick="stepFile(1)" style="background: #8b5a2b; border: 1px solid #5a3818; color: #fffbcc; padding: 6px 12px; font-size: 13px; font-family: 'Georgia', serif; font-weight: bold; border-radius: 4px; cursor: pointer;" disabled>Következő →</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loader">Hártyák betöltése folyamatban...</div>
    <div id="help-tip">Bal gomb: Forgatás | Jobb gomb: Mozgatás | Görgő: Közelítés</div>

    <script>
        let scene, camera, renderer, controls;
        let currentModel = null;
        let gridHelper, axesHelper;

        // Inicializálás
        function init() {
            const container = document.getElementById('canvas-container');

            // Jelenet
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x110d08);

            // Kamera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            // Renderelő
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Vezérlők
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // ne mehessen a föld alá nagyon

            // Fények
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xfff7e6, 0.8);
            dirLight1.position.set(10, 20, 10);
            dirLight1.castShadow = true;
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xddecff, 0.4);
            dirLight2.position.set(-10, 10, -10);
            scene.add(dirLight2);

            // Segédrács és tengelyek
            gridHelper = new THREE.GridHelper(20, 20, 0x8b5a2b, 0x4a2c0f);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);

            axesHelper = new THREE.AxesHelper(3);
            scene.add(axesHelper);

            // Ablak átméretezés kezelése
            window.addEventListener('resize', onWindowResize);

            setupDragAndDrop();
            animate();
        }

        // Animációs ciklus
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Segédrács kapcsoló
        function toggleGrid() {
            gridHelper.visible = !gridHelper.visible;
            axesHelper.visible = !axesHelper.visible;
        }

        // Kamera visszaállítása a modellhez igazítva
        function resetCamera() {
            if (currentModel) {
                fitCameraToModel(currentModel);
            } else {
                camera.position.set(5, 5, 5);
                controls.target.set(0, 0, 0);
                controls.update();
            }
        }

        const ALL_LOCAL_ASSETS = [

];

        let loadedFiles = [];
        let currentFileIndex = -1;
        let activeList = [];
        let activeFolder = "";
        let isUsingHttp = false;

        // Fájlok listájának feldolgozása (szűrés .glb-re és rendezés név szerint)
        function handleFileList(files) {
            const glbFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.glb'));
            if (glbFiles.length === 0) {
                alert('Nem található .glb fájl a kijelölésben!');
                return;
            }

            // Ha egyetlen fájlt töltöttünk be, megpróbáljuk párosítani a beágyazott listákkal
            if (glbFiles.length === 1) {
                const singleFile = glbFiles[0];
                const fileName = singleFile.name;
                
                let foundIndex = ALL_PIRATE_ASSETS.indexOf(fileName);
                if (foundIndex !== -1) {
                    activeList = ALL_PIRATE_ASSETS;
                    activeFolder = '../assets/pirates_assets/';
                    currentFileIndex = foundIndex;
                    isUsingHttp = true;
                    updateNavigationUI();
                    loadLocalFile(singleFile);
                    return;
                }
                
                foundIndex = ALL_LOCAL_ASSETS.indexOf(fileName);
                if (foundIndex !== -1) {
                    activeList = ALL_LOCAL_ASSETS;
                    activeFolder = '../assets/models/';
                    currentFileIndex = foundIndex;
                    isUsingHttp = true;
                    updateNavigationUI();
                    loadLocalFile(singleFile);
                    return;
                }

                // Ha nem találtuk meg a listában, akkor sima egyedi fájl
                loadedFiles = glbFiles;
                currentFileIndex = 0;
                isUsingHttp = false;
                updateNavigationUI();
                loadLocalFile(singleFile);
            } else {
                // Ha több fájlt vagy mappát választottunk ki egyszerre
                glbFiles.sort((a, b) => a.name.localeCompare(b.name, 'hu'));
                loadedFiles = glbFiles;
                currentFileIndex = 0;
                isUsingHttp = false;
                updateNavigationUI();
                loadLocalFile(loadedFiles[0]);
            }
        }

        function updateNavigationUI() {
            const counter = document.getElementById('file-counter');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            const total = isUsingHttp ? activeList.length : loadedFiles.length;
            const current = currentFileIndex + 1;

            if (total > 1) {
                counter.innerText = current + ' / ' + total;
                prevBtn.removeAttribute('disabled');
                nextBtn.removeAttribute('disabled');
            } else {
                counter.innerText = total === 1 ? '1 / 1' : '0 / 0';
                prevBtn.setAttribute('disabled', 'true');
                nextBtn.setAttribute('disabled', 'true');
            }
        }

        function stepFile(direction) {
            const total = isUsingHttp ? activeList.length : loadedFiles.length;
            if (total === 0) return;

            currentFileIndex += direction;
            if (currentFileIndex < 0) currentFileIndex = total - 1;
            if (currentFileIndex >= total) {
                currentFileIndex = 0;
            }

            updateNavigationUI();

            if (isUsingHttp) {
                loadHttpFile(activeFolder + activeList[currentFileIndex], activeList[currentFileIndex]);
            } else {
                loadLocalFile(loadedFiles[currentFileIndex]);
            }
        }

        // Fájl drag-and-drop és tallózás beállítása
        function setupDragAndDrop() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const folderInput = document.getElementById('folder-input');

            // Drag események megelőzése
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                window.addEventListener(eventName, e => e.preventDefault());
                window.addEventListener(eventName, e => e.stopPropagation());
            });

            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            
            dropZone.addEventListener('drop', (e) => {
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileList(files);
                }
            });

            fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    handleFileList(files);
                }
            });

            folderInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    handleFileList(files);
                }
            });
        }

        // Modell betöltése HTTP URL-ről
        function loadHttpFile(url, fileName) {
            const loaderDiv = document.getElementById('loader');
            loaderDiv.style.display = 'block';

            // Előző modell eltávolítása
            clearCurrentModel();

            const loader = new THREE.GLTFLoader();
            loader.load(url, function(gltf) {
                currentModel = gltf.scene;
                let polyCount = 0;
                currentModel.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        polyCount += node.geometry.attributes.position.count / 3;
                        if (node.material) node.material.roughness = 0.6;
                    }
                });

                scene.add(currentModel);
                fitCameraToModel(currentModel);

                document.getElementById('stats-panel').style.display = 'block';
                document.getElementById('model-name').innerText = fileName;
                document.getElementById('model-size').innerText = 'HTTP elérés';
                document.getElementById('model-polys').innerText = Math.round(polyCount).toLocaleString();

                loaderDiv.style.display = 'none';
            }, undefined, function(error) {
                console.error('Hiba a HTTP betöltés során:', error);
                alert('Nem sikerült betölteni a fájlt a kiszolgálóról. Ellenőrizd a szimbolikus linket!');
                loaderDiv.style.display = 'none';
            });
        }

        function clearCurrentModel() {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel.traverse(node => {
                    if (node.isMesh) {
                        node.geometry.dispose();
                        if (Array.isArray(node.material)) {
                            node.material.forEach(m => m.dispose());
                        } else {
                            node.material.dispose();
                        }
                    }
                });
                currentModel = null;
            }
        }

        // Modell betöltése helyi fájlból
        function loadLocalFile(file) {
            if (!file.name.toLowerCase().endsWith('.glb')) {
                alert('Csak .glb fájlokat tudsz betölteni!');
                return;
            }

            const loaderDiv = document.getElementById('loader');
            loaderDiv.style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(e) {
                const contents = e.target.result;

                // Előző modell eltávolítása
                if (currentModel) {
                    scene.remove(currentModel);
                    currentModel.traverse(node => {
                        if (node.isMesh) {
                            node.geometry.dispose();
                            if (Array.isArray(node.material)) {
                                node.material.forEach(m => m.dispose());
                            } else {
                                node.material.dispose();
                            }
                        }
                    });
                }

                const loader = new THREE.GLTFLoader();
                loader.parse(contents, '', function(gltf) {
                    currentModel = gltf.scene;

                    // Modell árnyékok és beállítások
                    let polyCount = 0;
                    currentModel.traverse(node => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            polyCount += node.geometry.attributes.position.count / 3;
                            
                            // Ha az anyagok nincsenek megfelelően beállítva, adunk nekik alap fémes / durva kinézetet
                            if (node.material) {
                                node.material.roughness = 0.6;
                            }
                        }
                    });

                    scene.add(currentModel);

                    // Kamera igazítása a modell méretéhez
                    fitCameraToModel(currentModel);

                    // Statisztikák frissítése
                    document.getElementById('stats-panel').style.display = 'block';
                    document.getElementById('model-name').innerText = file.name;
                    document.getElementById('model-size').innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                    document.getElementById('model-polys').innerText = Math.round(polyCount).toLocaleString();

                    loaderDiv.style.display = 'none';
                }, function(error) {
                    console.error('Hiba a betöltés során:', error);
                    alert('Hiba a GLB fájl feldolgozása közben!');
                    loaderDiv.style.display = 'none';
                });
            };

            reader.readAsArrayBuffer(file);
        }

        // Kamera automatikus beállítása a modell méreteihez
        function fitCameraToModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Modell középpontba helyezése a föld felett
            model.position.x += (model.position.x - center.x);
            model.position.z += (model.position.z - center.z);
            model.position.y += (model.position.y - box.min.y); // Földre állítás

            // Újraszámoljuk a Box-ot a mozgatás után
            box.setFromObject(model);
            box.getCenter(center);
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / (2 * Math.tan(fov / 2)));
            cameraZ *= 1.5; // Kicsi ráhagyás

            camera.position.set(center.x + cameraZ * 1.0, center.y + cameraZ * 0.8, center.z + cameraZ * 1.0);
            
            // Orbit vezérlők céljának átállítása a modell közepére
            controls.target.copy(center);
            
            // Kamera vágási síkok korrigálása
            camera.near = maxDim / 100;
            camera.far = cameraZ * 10;
            camera.updateProjectionMatrix();

            // Rács méretének beállítása a modell méretéhez
            if (gridHelper) {
                scene.remove(gridHelper);
                gridHelper = new THREE.GridHelper(maxDim * 3, 20, 0x8b5a2b, 0x4a2c0f);
                gridHelper.position.y = -0.01;
                scene.add(gridHelper);
            }

            controls.update();
        }
